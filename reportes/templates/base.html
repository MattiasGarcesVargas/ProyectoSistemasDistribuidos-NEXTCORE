<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Reportes — Inventario{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #F1F5F9; color: #1E293B; }

    header {
      background: linear-gradient(135deg, #1E40AF 0%, #2563EB 100%);
      color: white; padding: 16px 32px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    nav {
      background: white; border-bottom: 1px solid #E2E8F0;
      padding: 0 32px; display: flex; gap: 4px; flex-wrap: wrap;
    }
    nav a {
      display: block; padding: 12px 16px; text-decoration: none;
      color: #475569; font-size: 0.88rem; font-weight: 500;
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    nav a:hover, nav a.active { color: #2563EB; border-bottom-color: #2563EB; }

    main { max-width: 1400px; margin: 0 auto; padding: 32px; }

    .card {
      background: white; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden;
    }
    .card-header {
      padding: 20px 24px; border-bottom: 1px solid #E2E8F0;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .card-header h2 { font-size: 1.1rem; color: #1E293B; }
    .card-body { padding: 24px; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 99px;
      font-size: 0.78rem; font-weight: 600;
    }
    .badge-danger  { background:#FEE2E2; color:#B91C1C; }
    .badge-success { background:#DCFCE7; color:#166534; }
    .badge-info    { background:#DBEAFE; color:#1D4ED8; }
    .badge-warning { background:#FEF9C3; color:#854D0E; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      background: #1E40AF; color: white; padding: 10px 14px;
      text-align: left; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em;
    }
    tbody tr:nth-child(even) { background: #F8FAFC; }
    tbody tr:hover { background: #EFF6FF; }
    td { padding: 9px 14px; border-bottom: 1px solid #E2E8F0; vertical-align: middle; }
    tfoot td { background: #1E3A5F; color: white; font-weight: 700; padding: 10px 14px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; text-decoration: none;
      font-size: 0.83rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-pdf  { background:#EF4444; color:white; }
    .btn-csv  { background:#16A34A; color:white; }
    .btn-blue { background:#2563EB; color:white; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filters label { font-size: 0.8rem; font-weight: 600; color: #475569; }
    .filters input[type=date] {
      display: block; margin-top: 4px; padding: 7px 10px; border: 1px solid #CBD5E1;
      border-radius: 6px; font-size: 0.875rem;
    }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .stat-card .val { font-size: 2rem; font-weight: 700; color: #2563EB; }
    .stat-card .lbl { font-size: 0.8rem; color: #64748B; margin-top: 4px; }

    .alert-danger { background:#FEF2F2; border:1px solid #FCA5A5; color:#7F1D1D; padding:12px 16px; border-radius:8px; margin-bottom:16px; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>📦 Sistema de Inventario — Reportes</h1>
    <span>Servicio de Reportes · Puerto 8081</span>
  </div>
</header>
<nav>
  <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Inicio</a>
  <a href="/reportes/stock-bajo" {% if 'stock-bajo' in request.url.path %}class="active"{% endif %}>Stock Bajo</a>
  <a href="/reportes/mas-movidos" {% if 'mas-movidos' in request.url.path %}class="active"{% endif %}>Más Movidos</a>
  <a href="/reportes/valor-inventario" {% if 'valor-inventario' in request.url.path %}class="active"{% endif %}>Valor Inventario</a>
  <a href="/reportes/movimientos" {% if 'movimientos' in request.url.path and 'mas' not in request.url.path %}class="active"{% endif %}>Movimientos</a>
  <a href="/reportes/proveedores" {% if 'proveedores' in request.url.path %}class="active"{% endif %}>Proveedores</a>
  <a href="/docs" target="_blank">API Docs</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
